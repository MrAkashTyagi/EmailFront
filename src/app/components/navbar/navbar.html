<mat-toolbar color="primary" class="mat-elevation-z4" style="display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 0 24px;">
  
  <!-- Left Section: Menu button and Branding -->
  <div style="display: flex; align-items: center; gap: 10px;">
    <button mat-icon-button [matMenuTriggerFor]="appMenu" aria-label="Menu icon">
      <mat-icon>menu</mat-icon>
    </button>
    <span style="font-weight: 500; font-size: 18px; letter-spacing: 0.5px;">Email GUI</span>
  </div>

  <!-- Right Section: Shared input controls block shifting from main tables -->
  <div style="display: flex; align-items: center; gap: 16px;">
    
    <!-- Premium Balanced Dynamic Search Bar -->
    <div style="position: relative; display: flex; align-items: center;">
      <span style="position: absolute; left: 12px; color: rgba(255,255,255,0.7); font-size: 16px;">🔍</span>
      <input type="text" 
             [placeholder]="getPlaceholderText()" 
             (keyup)="onSearch($event)"
             style="background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); color: white; padding: 8px 12px 8px 36px; border-radius: 6px; width: 250px; font-size: 14px; outline: none; transition: all 0.3s;"
             onfocus="this.style.background='#ffffff'; this.style.color='#333333'"
             onblur="this.style.background='rgba(255, 255, 255, 0.15)'; this.style.color='#ffffff'">
    </div>

    <!-- Premium Balanced Dynamic Action Trigger Button -->
    <button mat-flat-button (click)="onAddClick()"
      style="background: rgba(255, 255, 255, 0.2); color: white; font-weight: 500; border-radius: 6px; height: 38px; border: 1px solid rgba(255,255,255,0.1);">
      <span style="margin-right: 4px; font-weight: bold;">+</span> {{ getButtonText() }}
    </button>
  </div>

</mat-toolbar>

<!-- Detached Dropdown Menu block -->
<mat-menu #appMenu="matMenu" panelClass="custom-premium-menu">
  <div style="background-color: #ffffff !important; --mat-menu-container-color: #ffffff !important; --mat-sys-surface: #ffffff !important; --mat-sys-surface-container: #ffffff !important; padding: 4px; border-radius: 4px;">
    
    <button mat-menu-item routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active-menu-item">
      <mat-icon>home</mat-icon><span>Home</span>
    </button>
    
    <button mat-menu-item routerLink="/sendemail" routerLinkActive="active-menu-item">
      <mat-icon>email</mat-icon><span>Send Email</span>
    </button>
    
    <button mat-menu-item routerLink="/family" routerLinkActive="active-menu-item">
      <mat-icon>people</mat-icon><span>Family List</span>
    </button>
    
    <button mat-menu-item routerLink="/guests" routerLinkActive="active-menu-item">
      <mat-icon>person</mat-icon><span>Guest List</span>
    </button>

  </div>
</mat-menu>

<!-- Spacer layout constraint override to push pages below floating bar -->
<div style="margin-top: 64px;"></div>
