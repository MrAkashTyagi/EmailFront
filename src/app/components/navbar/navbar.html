<mat-toolbar color="primary" class="mat-elevation-z4" style="display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 0 24px;">
  
  <!-- Left Section: Menu button and Branding -->
  <div style="display: flex; align-items: center; gap: 10px;">
    <button mat-icon-button [matMenuTriggerFor]="appMenu" aria-label="Menu icon">
      <mat-icon>menu</mat-icon>
    </button>
    <span style="font-weight: 500; font-size: 18px; letter-spacing: 0.5px;">Shadi GUI</span>
  </div>

  <!-- Right Section: Shared input controls block shifting from main tables -->
   <div style="display: flex; align-items: center; gap: 16px;">
    
    <!-- Premium Balanced Dynamic Search Bar (Solid White Background) -->
    <div style="position: relative; display: flex; align-items: center;">
      <!-- Icon color changed to Black with 0.6 opacity for subtle modern look -->
      <span style="position: absolute; left: 12px; color: rgba(0,0,0,0.6); font-size: 16px; z-index: 5;">🔍</span>
      <input type="text" 
             [placeholder]="getPlaceholderText()" 
             (keyup)="onSearch($event)"
             style="background: #ffffff !important; border: 1px solid #cbd5e1; color: #000000 !important; padding: 8px 12px 8px 36px; border-radius: 6px; width: 250px; font-size: 14px; outline: none; transition: all 0.3s; font-weight: 500;"
             placeholder-color="rgba(0,0,0,0.4)">
    </div>

    <!-- Premium Balanced Dynamic Action Trigger Button (Solid White Background & Black Text) -->
    <button mat-flat-button (click)="onAddClick()"
      style="background: #ffffff !important; color: #000000 !important; font-weight: 600; border-radius: 6px; height: 38px; border: 1px solid #cbd5e1; box-shadow: 0px 1px 3px rgba(0,0,0,0.05);">
      <span style="margin-right: 4px; font-weight: bold; color: #000000 !important;">+</span> {{ getButtonText() }}
    </button>
  </div>

</mat-toolbar>

<!-- Detached Dropdown Menu block -->
<mat-menu #appMenu="matMenu" panelClass="custom-premium-menu">
  
  <!-- Home Page link trigger block -->
  <button mat-menu-item 
          routerLink="/" 
          [routerLinkActiveOptions]="{exact: true}" 
          routerLinkActive="active-menu-item">
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </button>
  
  <!-- Send Email page link trigger block -->
  <button mat-menu-item 
          routerLink="/sendemail" 
          routerLinkActive="active-menu-item">
    <mat-icon>email</mat-icon>
    <span>Send Email</span>
  </button>
  
  <!-- Family Management grid page link trigger block -->
  <button mat-menu-item 
          routerLink="/family" 
          routerLinkActive="active-menu-item">
    <mat-icon>people</mat-icon>
    <span>Family List</span>
  </button>
  
  <!-- Mehman / Guest Management grid page link trigger block -->
  <button mat-menu-item 
          routerLink="/guests" 
          routerLinkActive="active-menu-item">
    <mat-icon>person</mat-icon>
    <span>Guest List</span>
  </button>

</mat-menu>

<!-- Spacer layout constraint override to push pages below floating bar -->
<div style="margin-top: 64px;"></div>
